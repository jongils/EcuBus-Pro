name: Build-macOS

on:
  push:
    branches: [master]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # Build job
  build:
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Embedding Python
        uses: ./.github/actions/setup-python-build
      - name: Build App
        uses: ./.github/actions/build-app
        with:
          platform: mac
          run-sdk-build: 'false'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          main_vite_client_id: ${{ secrets.CLIENT_ID }}
          main_vite_client_secret: ${{ secrets.CLIENT_SECRET }}
      - uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: dist/*.dmg

